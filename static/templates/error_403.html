{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center" style="border: none; border-radius: 15px;">
                <div class="card-header text-white" style="border-radius: 15px 15px 0 0; background: linear-gradient(135deg, #dc3545 0%, #c82333 100%) !important;">
                    <h4 class="mb-0">
                        <i class="bi bi-shield-exclamation"></i> Ошибка 403
                    </h4>
                </div>
                <div class="card-body p-5">
                    <i class="bi bi-lock-fill fs-1 text-danger"></i>
                    <h3 class="mt-3">Доступ запрещён</h3>
                    <p class="text-muted">У вас нет прав для просмотра этой страницы.</p>
                    <p class="text-muted">Пожалуйста, авторизуйтесь или обратитесь к администратору.</p>
                    <div class="mt-4">
                        {% if not current_user.is_authenticated %}
                            <a href="/login" class="btn btn-primary">
                                <i class="bi bi-box-arrow-in-right"></i> Войти
                            </a>
                        {% endif %}
                        <a href="/" class="btn btn-outline-secondary">
                            <i class="bi bi-house-door"></i> На главную
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
