{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center" style="border: none; border-radius: 15px;">
                <div class="card-header text-white" style="border-radius: 15px 15px 0 0; background: linear-gradient(135deg, #dc3545 0%, #c82333 100%) !important;">
                    <h4 class="mb-0">
                        <i class="bi bi-bug"></i> Ошибка 500
                    </h4>
                </div>
                <div class="card-body p-5">
                    <i class="bi bi-server fs-1 text-danger"></i>
                    <h3 class="mt-3">Внутренняя ошибка сервера</h3>
                    <p class="text-muted">Что-то пошло не так. Мы уже работаем над исправлением.</p>
                    <p class="text-muted">Пожалуйста, попробуйте позже или свяжитесь с администратором.</p>
                    <div class="mt-4">
                        <a href="/" class="btn btn-primary" style="background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%); border: none;">
                            <i class="bi bi-house-door"></i> На главную
                        </a>
                        <a href="javascript:location.reload()" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-repeat"></i> Обновить
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
