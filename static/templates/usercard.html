{% extends "base.html" %}

{% block content %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ current_user.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-secondary">

<div class="vh-100 p-4">
    <div class="card border-dark h-100">
        <div class="card-header bg-dark text-white text-center">
            <h5>BeautyWeb</h5>
        </div>
        <div class="card-body text-center d-flex flex-column justify-content-center align-items-center">


            <p class="fw-bold fs-3 border-bottom pb-3 mb-4 w-75">{{ user.name }} {{ user.surname }}</p>

            <!-- Место для записи -->
            <div class="border border-secondary rounded p-4 text-muted w-75" style="min-height: 200px;">
                <p class="fs-5">{{ user_record }}</p>
            </div>

            <a href="{{ url_for('book') }}" class="btn btn-dark mt-4 px-4 py-2">Записаться</a>

        </div>
    </div>
</div>

</body>
{% endblock %}
