{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow" style="border: none; border-radius: 15px;">
                <div class="card-header text-white text-center" style="border-radius: 15px 15px 0 0; background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%) !important;">
                    <h4 class="mb-0">
                        <i class="bi bi-geo-alt"></i> Расположение
                    </h4>
                </div>
                <div class="card-body p-0">
                    <div id="map" style="width: 100%; height: 400px; border-radius: 0 0 15px 15px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=20f1ea3a-a011-4dd5-aec2-e6241854aec1&lang=ru_RU" type="text/javascript"></script>

<script type="text/javascript">
    function init() {
        var myMap = new ymaps.Map("map", {
            center: [55.762376, 37.603710],
            zoom: 16,
            controls: ['zoomControl', 'fullscreenControl']
        });

        var myPlacemark = new ymaps.Placemark([55.762376, 37.603710], {
            hintContent: 'BeautyWeb',
            balloonContent: '<strong>BeautyWeb</strong><br>Тверской бул., 24, стр. 1<br>📞 +7 (999) 123-45-67'
        }, {
            preset: 'islands#redDotIconWithCaption',
            iconCaption: 'BeautyWeb'
        });

        myMap.geoObjects.add(myPlacemark);
    }

    ymaps.ready(init);
</script>
{% endblock %}
