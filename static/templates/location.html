{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow" style="border: none; border-radius: 15px;">
                <div class="card-header text-white text-center" style="border-radius: 15px 15px 0 0; background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%) !important;">
                    <h4 class="mb-0">
                        <i class="bi bi-geo-alt"></i> Расположение
                    </h4>
                </div>
                <div class="card-body p-4 text-center">
                    <img src="{{ link }}" class="img-fluid rounded shadow" alt="Карта расположения" style="max-width: 100%;">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
