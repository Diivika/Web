{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow" style="border: none; border-radius: 15px;">
                <div class="card-header text-white text-center" style="border-radius: 15px 15px 0 0; background: linear-gradient(135deg, #dc3545 0%, #c82333 100%) !important;">
                    <h4 class="mb-0">
                        <i class="bi bi-shield-exclamation"></i> Доступ запрещён
                    </h4>
                </div>
                <div class="card-body p-5 text-center">
                    <i class="bi bi-person-lock fs-1 text-danger"></i>
                    <h3 class="mt-3">Требуется авторизация</h3>
                    <p class="text-muted mt-3">Для доступа к этой странице необходимо войти в систему.</p>
                    
                    <div class="alert alert-info mt-3">
                        <i class="bi bi-info-circle"></i> Пожалуйста, авторизуйтесь или зарегистрируйтесь
                    </div>
                    
                    <div class="mt-4">
                        <a href="/login" class="btn btn-primary" style="background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%); border: none;">
                            <i class="bi bi-box-arrow-in-right"></i> Войти
                        </a>
                        <a href="/register" class="btn btn-outline-primary">
                            <i class="bi bi-person-plus"></i> Зарегистрироваться
                        </a>
                    </div>
                    
                    <hr class="my-4">
                    
                    <div>
                        <a href="/" class="text-decoration-none">
                            <i class="bi bi-house-door"></i> Вернуться на главную
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
