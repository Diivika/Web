{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center" style="border: none; border-radius: 15px;">
                <div class="card-header text-white" style="border-radius: 15px 15px 0 0; background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%) !important;">
                    <h4 class="mb-0">
                        <i class="bi bi-info-circle"></i> {{ title }}
                    </h4>
                </div>
                <div class="card-body p-5">
                    <i class="bi bi-person-check-fill fs-1 text-success"></i>
                    <h3 class="mt-3">Добро пожаловать, {{ current_user.name }}!</h3>
                    <p class="text-muted">Вы уже вошли в систему как {{ current_user.email }}</p>

                    <div class="alert alert-info mt-3">
                        <i class="bi bi-info-circle"></i> Страница входа доступна только для гостей
                    </div>

                    <div class="mt-4">
                        <a href="/" class="btn btn-primary" style="background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%); border: none;">
                            <i class="bi bi-house-door"></i> На главную
                        </a>
                        <a href="/usercard" class="btn btn-outline-primary">
                            <i class="bi bi-person-circle"></i> Личный кабинет
                        </a>
                        <a href="/logout" class="btn btn-outline-danger">
                            <i class="bi bi-box-arrow-right"></i> Выйти
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
